name: otic_studio
description: OTIC Studio — Offline AI Learning Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation + UI
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1

  # AI inference — Android: LiteRT-LM (Gemma), Desktop: llama.cpp via FFI
  flutter_gemma: ^0.4.2
  ffi: ^2.1.0

  # Local storage — student memory, history summaries
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  path_provider: ^2.1.4
  path: ^1.9.0

  # PDF certificate generation (offline, pure Dart)
  pdf: ^3.10.8

  # Utilities
  riverpod_annotation: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/models/        # placeholder dir, actual model files gitignored
    - assets/prompts/       # system prompt templates
