name: otic_studio
description: Otic Studio - Offline AI Learning Operating System
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation + UI
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1

  # AI inference — Android: LiteRT-LM (Gemma), Desktop: llama.cpp via FFI
  flutter_gemma: ^0.4.2
  ffi: ^2.1.0

  # Local storage — student memory, history summaries
  drift: ^2.20.0
  drift_flutter: ^0.2.1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Model installer — lets the user pick the Gemma file from USB/Downloads
  file_picker: 8.3.7

  # PDF certificate generation (offline, pure Dart)
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/models/        # placeholder dir, actual model files gitignored
    - assets/prompts/       # system prompt templates
    - assets/branding/      # official brand logo

  # Bundled offline — google_fonts would fetch over the network at runtime
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
